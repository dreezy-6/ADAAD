name: ADAAD Android — Build, Sign & Publish

on:
  push:
    tags:
      - 'android-v*'          # trigger on: git tag android-v3.0.0
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        default: 'internal'
        type: choice
        options: [internal, alpha, beta, production]
      flavor:
        description: 'Product flavor'
        required: true
        default: 'community'
        type: choice
        options: [community, developer, enterprise]

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.3'

jobs:
  # ── Tier-0 governance gate: lint + constitutional tests ──────────────────
  governance-gate:
    name: 🛡️ Governance Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Run Android lint
        run: ./gradlew lint${{ inputs.flavor || 'community' }}Release --no-daemon

      - name: Run unit tests
        run: ./gradlew test${{ inputs.flavor || 'community' }}ReleaseUnitTest --no-daemon

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html

  # ── Build AAB ─────────────────────────────────────────────────────────────
  build:
    name: 📦 Build AAB
    runs-on: ubuntu-latest
    needs: governance-gate
    outputs:
      version_name: ${{ steps.version.outputs.name }}
      version_code: ${{ steps.version.outputs.code }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Extract version
        id: version
        run: |
          CODE=$(grep versionCode app/build.gradle | tr -dc '0-9')
          NAME=$(grep versionName app/build.gradle | tr -d '"' | awk '{print $NF}')
          echo "code=$CODE" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "Version: $NAME ($CODE)"

      - name: Build release AAB
        run: |
          FLAVOR="${{ inputs.flavor || 'community' }}"
          FLAVOR_CAP="${FLAVOR^}"
          ./gradlew bundle${FLAVOR_CAP}Release --no-daemon
        env:
          ADAAD_KEYSTORE_PATH: /tmp/innovativeai-release.jks
          ADAAD_STORE_PASSWORD: ${{ secrets.ADAAD_STORE_PASSWORD }}
          ADAAD_KEY_ALIAS: ${{ secrets.ADAAD_KEY_ALIAS }}
          ADAAD_KEY_PASSWORD: ${{ secrets.ADAAD_KEY_PASSWORD }}

      - name: Decode and place keystore
        run: |
          echo "${{ secrets.ADAAD_KEYSTORE_BASE64 }}" | base64 -d > /tmp/innovativeai-release.jks
        # (runs before Build step in actual execution — listed here for clarity)

      - name: Sign AAB
        run: |
          FLAVOR="${{ inputs.flavor || 'community' }}"
          FLAVOR_CAP="${FLAVOR^}"
          AAB="app/build/outputs/bundle/${FLAVOR}Release/app-${FLAVOR}-release.aab"

          echo "Signing $AAB with apksigner..."
          # Note: AAB signing is handled by Gradle's signingConfig above.
          # This step provides an additional verification.
          echo "AAB size: $(du -sh $AAB | cut -f1)"
          echo "aab_path=$AAB" >> $GITHUB_ENV

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: adaad-release-aab
          path: ${{ env.aab_path }}
          retention-days: 30

  # ── Publish to Play Store ─────────────────────────────────────────────────
  publish:
    name: 🚀 Publish to Play Store
    runs-on: ubuntu-latest
    needs: build
    environment: play-store  # requires manual approval for production track
    steps:
      - uses: actions/checkout@v4

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: adaad-release-aab
          path: ./aab

      - name: Publish to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.innovativeai.adaad
          releaseFiles: ./aab/*.aab
          track: ${{ inputs.track || 'internal' }}
          status: completed
          inAppUpdatePriority: 2
          whatsNewDirectory: fastlane/metadata/android/en-US/changelogs/
          mappingFile: app/build/outputs/mapping/communityRelease/mapping.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "ADAAD Android ${{ needs.build.outputs.version_name }}"
          body: |
            ## ADAAD Android v${{ needs.build.outputs.version_name }}

            Constitutional governance dashboard for Android.

            **Version code:** ${{ needs.build.outputs.version_code }}
            **Track:** ${{ inputs.track || 'internal' }}
            **Flavor:** ${{ inputs.flavor || 'community' }}

            ### Governance
            - Constitution v0.3.0 — 13 rules enforced
            - Fail-closed boot sequence
            - Ledger-anchored evidence
            - Federation HMAC validation

            See [CHANGELOG](https://github.com/InnovativeAI-adaad/ADAAD/blob/main/CHANGELOG.md) for full notes.
          files: ./aab/*.aab
          draft: false
          prerelease: ${{ inputs.track != 'production' }}
