# Summary (≤80 chars)
Summary: Constitutional governance for autonomous code evolution.

# Full description (Markdown supported, no HTML)
Description: |
  ADAAD — Autonomous Development & Adaptation Architecture — is an
  open-source system for governing autonomous AI code mutations from your
  Android device.

  Every code change proposed by an AI agent is evaluated against a
  constitutional rule system before it can be executed. Decisions are
  stored in an append-only, SHA-256 chain-hashed governance ledger that
  is deterministically replayable and audit-exportable.

  **What it does:**

  * Governance Dashboard — real-time constitutional health, active epochs,
    pending proposals, and live chain hash integrity display
  * Constitutional Rule Browser — all 13 rules with tier classification
    (Blocking / Post-Approval / Advisory) and plain-language explanations
  * Proposal Review — approve, reject, or escalate mutation proposals with
    full constitutional evaluation results shown inline
  * Governance Ledger — append-only, chain-hashed event log with evidence
    bundle export directly from your phone
  * Federation Monitor — multi-repo HMAC key health, dual-gate status,
    and key rotation alerts

  **Security:**

  * Governance signing keys in Android Keystore (biometric-gated)
  * Ledger never backed up to Google Drive — security by design
  * All API communication over TLS 1.2+
  * Fail-closed boot: app refuses to start with invalid governance config
  * No analytics, no advertising, no tracking

  Requires an active ADAAD workspace (free Community tier available).

  Source: github.com/InnovativeAI-adaad/ADAAD

RepoType: git
Repo: https://github.com/InnovativeAI-adaad/ADAAD

