# Build specification
# ─────────────────────────────────────────────────────────────────────────────
Builds:
  - versionName: '3.1.0'
    versionCode: 31000
    commit: free-v3.1.0
    subdir: android
    sudo:
      - apt-get update
      - apt-get install -y openjdk-17-jdk-headless
    gradle:
      - community
    # F-Droid reproducible build: remove signing config, F-Droid signs with its key
    # Build command: ./gradlew assembleCommunityRelease
    prebuild:
      - sed -i 's/signingConfig.*signingConfigs\.release//' app/build.gradle
    # Disable network access during F-Droid build (reproducibility requirement)
    scandelete:
      - keystore/

