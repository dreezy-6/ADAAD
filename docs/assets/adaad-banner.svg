<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" role="img" aria-label="ADAAD — Autonomous Development &amp; Adaptation Architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060d14"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="60%" stop-color="#7b61ff"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <linearGradient id="textgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8f4fd"/>
      <stop offset="100%" stop-color="#b8d4f0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="260" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1a2d45" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="65" x2="1200" y2="65"/>
    <line x1="0" y1="130" x2="1200" y2="130"/>
    <line x1="0" y1="195" x2="1200" y2="195"/>
    <line x1="300" y1="0" x2="300" y2="260"/>
    <line x1="600" y1="0" x2="600" y2="260"/>
    <line x1="900" y1="0" x2="900" y2="260"/>
  </g>

  <!-- Left accent bar -->
  <rect x="48" y="52" width="4" height="156" rx="2" fill="url(#accent)" filter="url(#glow)"/>

  <!-- Top accent line -->
  <rect x="48" y="40" width="680" height="1.5" rx="1" fill="url(#accent)" opacity="0.7"/>

  <!-- Bottom accent line -->
  <rect x="48" y="218" width="420" height="1.5" rx="1" fill="url(#accent)" opacity="0.4"/>

  <!-- Main wordmark -->
  <text x="72" y="135" fill="url(#textgrad)" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="82" font-weight="800" letter-spacing="-2" filter="url(#softglow)">ADAAD</text>

  <!-- Tagline -->
  <text x="74" y="174" fill="#5a8ab0" font-family="'SF Mono','Fira Code',monospace" font-size="16" letter-spacing="4" font-weight="400">AUTONOMOUS  DEVELOPMENT  &amp;  ADAPTATION  ARCHITECTURE</text>

  <!-- Right side — node graph decoration -->
  <g opacity="0.55" transform="translate(870, 50)">
    <!-- Nodes -->
    <circle cx="80" cy="40" r="6" fill="#00d4ff" filter="url(#glow)"/>
    <circle cx="160" cy="25" r="5" fill="#7b61ff"/>
    <circle cx="220" cy="70" r="7" fill="#00d4ff" filter="url(#glow)"/>
    <circle cx="140" cy="95" r="5" fill="#ff6b6b"/>
    <circle cx="60" cy="110" r="6" fill="#7b61ff"/>
    <circle cx="200" cy="130" r="4" fill="#00d4ff"/>
    <circle cx="100" cy="150" r="5" fill="#5a8ab0"/>
    <circle cx="260" cy="100" r="4" fill="#ff6b6b"/>
    <!-- Edges -->
    <line x1="80" y1="40" x2="160" y2="25" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
    <line x1="160" y1="25" x2="220" y2="70" stroke="#7b61ff" stroke-width="1" opacity="0.5"/>
    <line x1="220" y1="70" x2="140" y2="95" stroke="#00d4ff" stroke-width="1.5" opacity="0.7" filter="url(#glow)"/>
    <line x1="140" y1="95" x2="60" y2="110" stroke="#7b61ff" stroke-width="1" opacity="0.5"/>
    <line x1="140" y1="95" x2="200" y2="130" stroke="#ff6b6b" stroke-width="1" opacity="0.5"/>
    <line x1="60" y1="110" x2="100" y2="150" stroke="#5a8ab0" stroke-width="1" opacity="0.4"/>
    <line x1="200" y1="130" x2="260" y2="100" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <line x1="220" y1="70" x2="260" y2="100" stroke="#7b61ff" stroke-width="1" opacity="0.4"/>
    <line x1="80" y1="40" x2="60" y2="110" stroke="#5a8ab0" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Status pills -->
  <g transform="translate(72, 195)">
    <rect x="0" y="0" width="88" height="20" rx="10" fill="#0d2235" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.6"/>
    <text x="44" y="14" fill="#00d4ff" font-family="monospace" font-size="10" text-anchor="middle" letter-spacing="0.5">deterministic</text>

    <rect x="100" y="0" width="88" height="20" rx="10" fill="#0d2235" stroke="#7b61ff" stroke-width="0.8" stroke-opacity="0.6"/>
    <text x="144" y="14" fill="#7b61ff" font-family="monospace" font-size="10" text-anchor="middle" letter-spacing="0.5">governed</text>

    <rect x="200" y="0" width="88" height="20" rx="10" fill="#0d2235" stroke="#22c55e" stroke-width="0.8" stroke-opacity="0.6"/>
    <text x="244" y="14" fill="#22c55e" font-family="monospace" font-size="10" text-anchor="middle" letter-spacing="0.5">auditable</text>

    <rect x="300" y="0" width="88" height="20" rx="10" fill="#0d2235" stroke="#ff6b6b" stroke-width="0.8" stroke-opacity="0.6"/>
    <text x="344" y="14" fill="#ff6b6b" font-family="monospace" font-size="10" text-anchor="middle" letter-spacing="0.5">fail-closed</text>
  </g>
</svg>
