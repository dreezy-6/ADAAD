<svg xmlns="http://www.w3.org/2000/svg" width="700" height="160" viewBox="0 0 700 160" role="img" aria-label="ADAAD agent personas: Architect, Dream, Beast">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060d14"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <filter id="ag"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="700" height="160" fill="url(#abg)" rx="12"/>

  <!-- ARCHITECT -->
  <rect x="20" y="20" width="200" height="120" rx="10" fill="#0d1f33" stroke="#00d4ff" stroke-width="1.5"/>
  <rect x="20" y="20" width="200" height="4" rx="2" fill="#00d4ff" opacity="0.8"/>
  <!-- icon: blueprint squares -->
  <rect x="55" y="44" width="16" height="16" rx="2" fill="none" stroke="#00d4ff" stroke-width="1.5" filter="url(#ag)"/>
  <rect x="63" y="52" width="16" height="16" rx="2" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <text x="120" y="55" fill="#00d4ff" font-family="monospace" font-size="14" font-weight="700" filter="url(#ag)">ARCHITECT</text>
  <text x="35" y="90" fill="#5a8ab0" font-family="monospace" font-size="9.5">Structural cohesion</text>
  <text x="35" y="105" fill="#5a8ab0" font-family="monospace" font-size="9.5">Interface contracts</text>
  <text x="35" y="120" fill="#5a8ab0" font-family="monospace" font-size="9.5">Dependency refactor</text>
  <rect x="110" y="130" width="90" height="1" rx="0.5" fill="#00d4ff" opacity="0.3"/>
  <text x="155" y="143" fill="#3a6a8a" font-family="monospace" font-size="8.5" text-anchor="middle">risk: low · type: structural</text>

  <!-- DREAM -->
  <rect x="250" y="20" width="200" height="120" rx="10" fill="#0d1233" stroke="#7b61ff" stroke-width="1.5"/>
  <rect x="250" y="20" width="200" height="4" rx="2" fill="#7b61ff" opacity="0.8"/>
  <!-- icon: star/spark -->
  <text x="270" y="58" fill="#7b61ff" font-family="monospace" font-size="20" filter="url(#ag)">✦</text>
  <text x="310" y="55" fill="#7b61ff" font-family="monospace" font-size="14" font-weight="700" filter="url(#ag)">DREAM</text>
  <text x="265" y="90" fill="#6a5ab0" font-family="monospace" font-size="9.5">High-novelty proposals</text>
  <text x="265" y="105" fill="#6a5ab0" font-family="monospace" font-size="9.5">Cross-domain patterns</text>
  <text x="265" y="120" fill="#6a5ab0" font-family="monospace" font-size="9.5">Exploration driver</text>
  <rect x="340" y="130" width="90" height="1" rx="0.5" fill="#7b61ff" opacity="0.3"/>
  <text x="385" y="143" fill="#5a4a8a" font-family="monospace" font-size="8.5" text-anchor="middle">risk: high · type: experimental</text>

  <!-- BEAST -->
  <rect x="480" y="20" width="200" height="120" rx="10" fill="#1a1108" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="480" y="20" width="200" height="4" rx="2" fill="#f59e0b" opacity="0.8"/>
  <!-- icon: lightning -->
  <text x="498" y="60" fill="#f59e0b" font-family="monospace" font-size="20" filter="url(#ag)">⚡</text>
  <text x="532" y="55" fill="#f59e0b" font-family="monospace" font-size="14" font-weight="700" filter="url(#ag)">BEAST</text>
  <text x="495" y="90" fill="#8a6a30" font-family="monospace" font-size="9.5">Micro-optimisations</text>
  <text x="495" y="105" fill="#8a6a30" font-family="monospace" font-size="9.5">Dead code removal</text>
  <text x="495" y="120" fill="#8a6a30" font-family="monospace" font-size="9.5">Coverage additions</text>
  <rect x="570" y="130" width="90" height="1" rx="0.5" fill="#f59e0b" opacity="0.3"/>
  <text x="615" y="143" fill="#6a5020" font-family="monospace" font-size="8.5" text-anchor="middle">risk: very low · type: perf</text>
</svg>
