      {
        "domain": "security",
        "patterns": [
          "security/*",
          "security/**"
        ]
      },
      {
        "domain": "payments",
        "patterns": [
          "payments/*",
          "payments/**"
        ]
      },
      {
        "domain": "schema",
        "patterns": [
          "schema/*",
          "schema/**",
          "schemas/*",
          "schemas/**"
        ]
      },
      {
        "domain": "docs",
        "patterns": [
          "docs/*",
          "docs/**",
          "*.md",
          "*.txt"
        ]
      }
    ]
  }
