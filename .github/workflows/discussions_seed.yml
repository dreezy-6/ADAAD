# SPDX-License-Identifier: MIT
# ADAAD Phase 13 — GitHub Discussions Auto-Seed
#
# GitHub Discussions are indexed by Google and surface in GitHub search.
# Seeding meaningful discussions = organic discoverability.
# Runs once on repo push, then monthly.

name: 💬 Discussions Seed

on:
  schedule:
    - cron: "0 10 1 * *"   # 1st of each month at 10AM UTC
  workflow_dispatch:

permissions:
  discussions: write
  contents: read

jobs:
  seed:
    name: Seed GitHub Discussions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Create pinned discussions via GitHub GraphQL
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          TOKEN = os.environ["GITHUB_TOKEN"]
          HEADERS = {
              "Authorization": f"bearer {TOKEN}",
              "Content-Type": "application/json",
          }

          # Get repo + discussion category IDs
          query = """
          query {
            repository(owner: "dreezy-6", name: "ADAAD") {
              id
              discussionCategories(first: 10) {
                nodes { id name }
              }
            }
          }
          """
          req = urllib.request.Request(
              "https://api.github.com/graphql",
              data=json.dumps({"query": query}).encode(),
              headers=HEADERS, method="POST"
          )
          with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())

          repo = data.get("data", {}).get("repository", {})
          repo_id = repo.get("id")
          cats = repo.get("discussionCategories", {}).get("nodes", [])
          print(f"Repo ID: {repo_id}")
          print(f"Categories: {[c['name'] for c in cats]}")

          # Find General or Q&A category
          cat_id = None
          for c in cats:
              if c["name"] in ("General", "Q&A", "Show and tell"):
                  cat_id = c["id"]
                  break

          if not repo_id or not cat_id:
              print("Could not find repo/category IDs — skipping discussion creation")
              exit(0)

          discussions = [
              {
                  "title": "🏛️ Architecture Q&A — ask anything about the constitutional governance model",
                  "body": """Welcome! This is the place to ask deep questions about ADAAD's architecture.

**Good topics:**
- How the 16 governance rules are ordered and evaluated
- The deterministic replay mechanism and what "byte-identical" means in practice
- How the genetic algorithm interacts with the constitutional gate
- Federated multi-repo governance
- The evidence ledger hash chain structure

**Dustin (founder) monitors this thread.** No question is too basic or too advanced.

---

*ADAAD — [github.com/InnovativeAI-adaad/ADAAD](https://github.com/InnovativeAI-adaad/ADAAD)*"""
              },
              {
                  "title": "💡 Show & tell — what are you using ADAAD on?",
                  "body": """Share what you're running ADAAD on — we want to hear every use case.

**Tell us:**
- What codebase or project you're governing
- Which agents (Architect/Dream/Beast) are producing the most useful mutations
- Any governance rules that are blocking more than you expected
- Surprising wins from the genetic algorithm

This thread is a permanent record of ADAAD in the wild.

---
*All tiers welcome — Community (free), Pro, Enterprise.*"""
              },
          ]

          for d in discussions:
              mutation = f"""
              mutation {{
                createDiscussion(input: {{
                  repositoryId: "{repo_id}",
                  categoryId: "{cat_id}",
                  title: {json.dumps(d["title"])},
                  body: {json.dumps(d["body"])}
                }}) {{
                  discussion {{ id url }}
                }}
              }}
              """
              req = urllib.request.Request(
                  "https://api.github.com/graphql",
                  data=json.dumps({"query": mutation}).encode(),
                  headers=HEADERS, method="POST"
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      result = json.loads(r.read())
                      url = result.get("data", {}).get("createDiscussion", {}).get("discussion", {}).get("url", "")
                      print(f"Created: {url}")
              except Exception as e:
                  print(f"Discussion already exists or error: {e}")
          PYEOF
