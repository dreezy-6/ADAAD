name: Red-Team Nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  redteam-nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.server.txt
      - name: Run deterministic red-team full corpus
        run: PYTHONPATH=. python tools/run_redteam_harness.py --subset all --output reports/redteam/nightly.json
