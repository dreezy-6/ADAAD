name: Post-Merge Doc Sync

# ── Trigger ──────────────────────────────────────────────────────────────────
# Fires on every push to main EXCEPT commits made by this workflow itself
# (identified by the committer e-mail used below).  The `if` guard on the
# sync-and-commit job provides the skip condition.
on:
  push:
    branches: [main]
  workflow_dispatch:          # manual trigger for backfills / debugging

concurrency:
  group: post-merge-doc-sync   # only one sync job runs at a time
  cancel-in-progress: false    # never cancel an in-flight sync (data integrity)

# ── Permissions ───────────────────────────────────────────────────────────────
# write access to contents is required for the git push back to main.
permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  sync-and-commit:
    name: "Sync docs → commit → push"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Skip if this push was itself produced by this workflow to prevent loops.
    if: |
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[doc-sync]')

    steps:

      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout main at push SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          # Use GITHUB_TOKEN so the subsequent push is authenticated.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0       # full history so git log is available

      # ── 2. Python setup ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      # ── 3. Constitutional gate: validate VERSION before touching anything ───
      - name: Gate — validate VERSION file
        id: version_gate
        run: |
          set -euo pipefail
          VERSION=$(cat VERSION)
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "SYNC_ERROR_BAD_VERSION: VERSION contains '${VERSION}'" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION gate PASSED: ${VERSION}"

      # ── 4. CHANGELOG gate: version must have an entry ───────────────────────
      - name: Gate — verify CHANGELOG entry exists for current version
        run: |
          set -euo pipefail
          VERSION="${{ steps.version_gate.outputs.version }}"
          if ! grep -q "## \[${VERSION}\]" CHANGELOG.md; then
            echo "SYNC_ERROR_MISSING_CHANGELOG: no entry for [${VERSION}] in CHANGELOG.md" >&2
            exit 1
          fi
          echo "CHANGELOG gate PASSED: [${VERSION}] entry found"

      # ── 5. Dry-run: print every planned change, fail closed on errors ───────
      - name: Dry-run — enumerate planned doc changes
        run: |
          python scripts/sync_docs_on_merge.py --dry-run --format json

      # ── 6. Run the actual sync ───────────────────────────────────────────────
      - name: Execute doc sync
        id: sync
        run: |
          python scripts/sync_docs_on_merge.py --format json | tee /tmp/sync_output.json
          # Surface files_changed count to subsequent steps
          FILES_CHANGED=$(python3 -c "
          import json, sys
          for line in open('/tmp/sync_output.json'):
              obj = json.loads(line.strip())
              if obj.get('event') == 'sync_complete':
                  print(obj.get('files_changed', 0))
                  sys.exit(0)
          print(0)
          ")
          echo "files_changed=${FILES_CHANGED}" >> "$GITHUB_OUTPUT"
          echo "Sync complete — ${FILES_CHANGED} file(s) changed"

      # ── 7. Validate: no governance/schema files were touched ────────────────
      - name: Gate — verify protected files were not modified
        run: |
          set -euo pipefail
          PROTECTED_CHANGED=$(git diff --name-only HEAD | grep -E \
            '^(docs/CONSTITUTION\.md|docs/governance/ARCHITECT_SPEC|governance/CANONICAL|governance_runtime_profile\.lock\.json|runtime/constitution\.py|schemas/|\.github/workflows/)' \
            || true)
          if [ -n "$PROTECTED_CHANGED" ]; then
            echo "SYNC_ERROR_PROTECTED_FILE_MODIFIED: ${PROTECTED_CHANGED}" >&2
            exit 1
          fi
          echo "Protected-file gate PASSED"

      # ── 8. Git identity for the commit ──────────────────────────────────────
      - name: Configure git identity
        run: |
          git config user.name  "ArchitectAgent [ADAAD]"
          git config user.email "architect-agent@adaad.ai"

      # ── 9. Commit and push if anything changed ───────────────────────────────
      - name: Commit and push doc sync
        if: steps.sync.outputs.files_changed != '0'
        env:
          VERSION: ${{ steps.version_gate.outputs.version }}
        run: |
          set -euo pipefail
          git add -A

          # Build a machine-readable commit message with full audit trail
          CHANGED_FILES=$(git diff --cached --name-only | tr '\n' ' ')
          SHA_SHORT=$(git rev-parse --short HEAD)

          git commit -m "docs(sync): auto-align version + info-boxes → v${VERSION} [doc-sync]

Post-merge doc sync triggered by: ${SHA_SHORT}

Files updated: ${CHANGED_FILES}

Constitutional invariants verified:
  [PASS] VERSION file is semver-valid
  [PASS] CHANGELOG entry exists for v${VERSION}
  [PASS] No protected governance/schema files modified
  [PASS] Dry-run completed without errors before write

Reviewer: ArchitectAgent [ADAAD]
Gate: post_merge_doc_sync
Evidence: .github/workflows/post_merge_doc_sync.yml"

          git push origin HEAD:main

      # ── 10. No-op confirmation ────────────────────────────────────────────────
      - name: Confirm no changes needed
        if: steps.sync.outputs.files_changed == '0'
        run: echo "All docs already aligned with v${{ steps.version_gate.outputs.version }} — no commit needed."

      # ── 11. Write job summary ─────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        env:
          VERSION:       ${{ steps.version_gate.outputs.version }}
          FILES_CHANGED: ${{ steps.sync.outputs.files_changed }}
        run: |
          {
            echo "## Post-Merge Doc Sync"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Version | \`${VERSION}\` |"
            echo "| Files changed | \`${FILES_CHANGED}\` |"
            echo "| Trigger SHA | \`${{ github.sha }}\` |"
            echo "| Triggered by | \`${{ github.actor }}\` |"
            echo ""
            echo "### Sync output"
            echo '```json'
            cat /tmp/sync_output.json 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
