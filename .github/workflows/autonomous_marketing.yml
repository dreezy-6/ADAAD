name: 🚀 Autonomous Marketing Engine

# ════════════════════════════════════════════════════════════════════════════
# Phase 13 — Maximum Autonomous Exposure
#
# Schedule: 4x daily (9AM, 3PM UTC + push-triggered + on-demand)
# Platforms: GitHub meta · Dev.to · Hashnode · awesome-list PRs · Reddit
#            Twitter/X · Human queue generation · Claude discovery
#
# Add secrets to activate each platform:
#   ANTHROPIC_API_KEY     — Claude API (content generation + discovery)
#   DEVTO_API_KEY         — Dev.to Forem API
#   HASHNODE_TOKEN        — Hashnode Personal Access Token
#   HASHNODE_PUB_ID       — Hashnode Publication ID
#   REDDIT_CLIENT_ID      — Reddit OAuth2 app client ID
#   REDDIT_CLIENT_SECRET  — Reddit OAuth2 app secret
#   REDDIT_USERNAME       — Reddit account username
#   REDDIT_PASSWORD       — Reddit account password
#   TWITTER_BEARER_TOKEN  — Twitter API v2 (optional)
#
# Every action is governed by MarketingGate, logged to marketing/state/,
# and committed back to the repo after each job.
# ════════════════════════════════════════════════════════════════════════════

on:
  schedule:
    - cron: "0 9 * * *"    # 9AM UTC daily — primary cycle
    - cron: "0 15 * * *"   # 3PM UTC daily — second wave (catches EU afternoon)
    - cron: "0 9 * * 1"    # Monday 9AM — weekly discovery run
  push:
    branches: [main]        # every push to main = immediate exposure blast
  workflow_dispatch:
    inputs:
      target:
        description: "Target platform"
        required: false
        default: "all"
        type: choice
        options: [all, github, devto, hashnode, prs, reddit, twitter, discover]
      dry_run:
        description: "Dry run (no real API calls)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      discover:
        description: "Run Claude opportunity discovery"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

env:
  PYTHONUNBUFFERED: "1"
  PYTHON_VERSION: "3.11.9"

jobs:

  # ── GitHub metadata — runs on EVERY trigger, highest impact per-second ────
  github_metadata:
    name: 📌 GitHub Topics & Description
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'github'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Sync topics + description + website
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          MARKETING_DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python market.py --target github
      - name: Commit state
        run: |
          git config user.name  "ADAAD Marketing Bot"
          git config user.email "marketing-bot@innovativeai.dev"
          git add marketing/state/ || true
          git diff --staged --quiet || git commit -m "chore(marketing): github meta [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push || true

  # ── Dev.to articles ─────────────────────────────────────────────────────
  devto:
    name: ✍️  Dev.to Articles
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: github_metadata
    if: |
      (github.event_name == 'schedule') ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'devto'))
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Publish to Dev.to
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEVTO_API_KEY:     ${{ secrets.DEVTO_API_KEY }}
          MARKETING_DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python market.py --target devto
      - name: Commit state
        run: |
          git config user.name  "ADAAD Marketing Bot"
          git config user.email "marketing-bot@innovativeai.dev"
          git pull --rebase
          git add marketing/state/ || true
          git diff --staged --quiet || git commit -m "chore(marketing): devto [$(date -u '+%Y-%m-%d')]"
          git push || true

  # ── Hashnode articles — Phase 13 new channel ────────────────────────────
  hashnode:
    name: 📝 Hashnode Articles
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: github_metadata
    if: |
      (github.event_name == 'schedule') ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'hashnode'))
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Publish to Hashnode
        env:
          HASHNODE_TOKEN:    ${{ secrets.HASHNODE_TOKEN }}
          HASHNODE_PUB_ID:   ${{ secrets.HASHNODE_PUB_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MARKETING_DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python market.py --target hashnode
      - name: Commit state
        run: |
          git config user.name  "ADAAD Marketing Bot"
          git config user.email "marketing-bot@innovativeai.dev"
          git pull --rebase
          git add marketing/state/ || true
          git diff --staged --quiet || git commit -m "chore(marketing): hashnode [$(date -u '+%Y-%m-%d')]"
          git push || true

  # ── Awesome-list PRs — now 11 targets ──────────────────────────────────
  awesome_prs:
    name: ⭐ Awesome-List PRs (11 targets)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: github_metadata
    if: |
      (github.event_name == 'schedule') ||
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'prs'))
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Open PRs to awesome-* lists
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          MARKETING_DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python market.py --target prs
      - name: Commit state
        run: |
          git config user.name  "ADAAD Marketing Bot"
          git config user.email "marketing-bot@innovativeai.dev"
          git pull --rebase
          git add marketing/state/ || true
          git diff --staged --quiet || git commit -m "chore(marketing): awesome-list PRs [$(date -u '+%Y-%m-%d')]"
          git push || true

  # ── Reddit ─────────────────────────────────────────────────────────────
  reddit:
    name: 📣 Reddit Posts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [devto, hashnode]
    if: |
      (github.event_name == 'schedule') ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'reddit'))
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Post to Reddit
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME:      ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD:      ${{ secrets.REDDIT_PASSWORD }}
          MARKETING_DRY_RUN:    ${{ inputs.dry_run || 'false' }}
        run: python market.py --target reddit
      - name: Commit state
        run: |
          git config user.name  "ADAAD Marketing Bot"
          git config user.email "marketing-bot@innovativeai.dev"
          git pull --rebase
          git add marketing/state/ || true
          git diff --staged --quiet || git commit -m "chore(marketing): reddit [$(date -u '+%Y-%m-%d')]"
          git push || true

  # ── Twitter/X ──────────────────────────────────────────────────────────
  twitter:
    name: 🐦 Twitter/X Thread
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [devto]
    if: |
      (github.event_name == 'schedule') ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'twitter'))
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Post Twitter/X thread
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          MARKETING_DRY_RUN:    ${{ inputs.dry_run || 'false' }}
        run: python market.py --target twitter
      - name: Commit state
        run: |
          git config user.name  "ADAAD Marketing Bot"
          git config user.email "marketing-bot@innovativeai.dev"
          git pull --rebase
          git add marketing/state/ || true
          git diff --staged --quiet || git commit -m "chore(marketing): twitter [$(date -u '+%Y-%m-%d')]"
          git push || true


  # ── Mastodon — fosstodon.org (FOSS dev community) ──────────────────────
  mastodon:
    name: 🐘 Mastodon (fosstodon.org)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      (github.event_name == 'schedule') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'all') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'mastodon')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Post to Mastodon (fosstodon.org)
        env:
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_INSTANCE:     "fosstodon.org"
          MARKETING_DRY_RUN:     ${{ inputs.dry_run || 'false' }}
        run: python market.py --target mastodon
      - name: Commit state
        run: |
          git config user.name  "ADAAD Marketing Bot"
          git config user.email "marketing-bot@innovativeai.dev"
          git pull --rebase
          git add marketing/state/ || true
          git diff --staged --quiet || git commit -m "chore(marketing): mastodon [$(date -u '+%Y-%m-%d')]"
          git push || true

  # ── GitHub Discussions seed ─────────────────────────────────────────────
  discussions:
    name: 💬 GitHub Discussions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.target == 'all') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'discussions')
    permissions:
      discussions: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Seed GitHub Discussions
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          MARKETING_DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python market.py --target discussions
      - name: Commit state
        run: |
          git config user.name  "ADAAD Marketing Bot"
          git config user.email "marketing-bot@innovativeai.dev"
          git pull --rebase
          git add marketing/state/ || true
          git diff --staged --quiet || git commit -m "chore(marketing): discussions [$(date -u '+%Y-%m-%d')]"
          git push || true

  # ── Weekly Claude discovery — every Monday ─────────────────────────────
  discover:
    name: 🔍 Claude Opportunity Discovery
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 9 * * 1') ||
      (github.event_name == 'workflow_dispatch' && inputs.discover == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'discover')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Discover new exposure targets via Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python market.py --discover
      - name: Commit discovered targets
        run: |
          git config user.name  "ADAAD Marketing Bot"
          git config user.email "marketing-bot@innovativeai.dev"
          git pull --rebase
          git add marketing/state/discovered_targets.json marketing/human_queue/ || true
          git diff --staged --quiet || git commit -m "chore(marketing): discovery [$(date -u '+%Y-%m-%d')]"
          git push || true

  # ── Human queue report — always runs at end ─────────────────────────────
  human_queue_report:
    name: 📋 Human Action Queue
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [devto, hashnode, awesome_prs, reddit, mastodon, discussions]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Generate human queue + status report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MARKETING_DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          python market.py --status
          python market.py --queue | tee marketing/human_queue/QUEUE_REPORT.md
      - name: Commit queue + drafts
        run: |
          git config user.name  "ADAAD Marketing Bot"
          git config user.email "marketing-bot@innovativeai.dev"
          git pull --rebase
          git add marketing/human_queue/ marketing/drafts/ || true
          git diff --staged --quiet || git commit -m "chore(marketing): queue updated [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push || true
