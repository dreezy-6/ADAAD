name: release_evidence_gate

on:
  push:
    tags:
      - "v0.70.0"

jobs:
  governance-release-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.server.txt

      - name: Verify Replay Proof Bundles Exist
        run: |
          if ! ls security/ledger/replay_proofs/*.json 1> /dev/null 2>&1; then
            echo "Replay proof artifacts missing."
            exit 1
          fi

      - name: Verify Replay Proof Bundles
        run: |
          for f in security/ledger/replay_proofs/*.json; do
            python tools/verify_replay_bundle.py "$f"
          done


      - name: Validate release evidence matrix and links
        run: |
          python scripts/validate_release_evidence.py --require-complete

      - name: Validate hardening claims against runtime capability checks
        run: |
          python scripts/validate_release_hardening_claims.py
      - name: Run Governance Tests
        run: |
          PYTHONPATH=. pytest tests/ -k governance -q

      - name: Run Sandbox Tests
        run: |
          PYTHONPATH=. pytest tests/sandbox -q
