name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      tests: ${{ steps.filter.outputs.tests }}
      governance: ${{ steps.filter.outputs.governance }}
      runtime: ${{ steps.filter.outputs.runtime }}
      security: ${{ steps.filter.outputs.security }}
      other: ${{ steps.filter.outputs.other }}
      docs_only: ${{ steps.classify.outputs.docs_only }}
      tests_only: ${{ steps.classify.outputs.tests_only }}
      gov_policy_flag: ${{ steps.classify.outputs.gov_policy_flag }}
      gov_replay_flag: ${{ steps.classify.outputs.gov_replay_flag }}
      pr_tier: ${{ steps.classify.outputs.pr_tier }}
      run_strict_replay: ${{ steps.classify.outputs.run_strict_replay }}
      run_evidence_suite: ${{ steps.classify.outputs.run_evidence_suite }}
      run_promotion_suite: ${{ steps.classify.outputs.run_promotion_suite }}
      strict_replay_reason: ${{ steps.classify.outputs.strict_replay_reason }}
      evidence_reason: ${{ steps.classify.outputs.evidence_reason }}
      promotion_reason: ${{ steps.classify.outputs.promotion_reason }}
      run_redteam_subset: ${{ steps.classify.outputs.run_redteam_subset }}
      redteam_reason: ${{ steps.classify.outputs.redteam_reason }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - 'docs/**'
              - '**/*.md'
            tests:
              - 'tests/**'
            governance:
              - 'governance/**'
              - 'docs/governance/**'
            runtime:
              - 'runtime/**'
              - 'app/**'
              - 'nexus_setup.py'
            security:
              - 'security/**'
            other:
              - '.github/**'
              - 'scripts/**'
              - 'tools/**'
              - 'requirements*.txt'
              - 'pyproject.toml'
      - name: Compute CI tier and gates
        id: classify
        env:
          IS_PR: ${{ github.event_name == 'pull_request' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          DOCS: ${{ steps.filter.outputs.docs }}
          TESTS: ${{ steps.filter.outputs.tests }}
          GOVERNANCE: ${{ steps.filter.outputs.governance }}
          RUNTIME: ${{ steps.filter.outputs.runtime }}
          SECURITY: ${{ steps.filter.outputs.security }}
          OTHER: ${{ steps.filter.outputs.other }}
        run: |
          set -euo pipefail

          docs_only=false
          tests_only=false
          gov_policy_flag=false
          gov_replay_flag=false
          pr_tier=standard

          if [ "$DOCS" = "true" ] && [ "$TESTS" = "false" ] && [ "$GOVERNANCE" = "false" ] && [ "$RUNTIME" = "false" ] && [ "$SECURITY" = "false" ] && [ "$OTHER" = "false" ]; then
            docs_only=true
          fi

          if [ "$TESTS" = "true" ] && [ "$DOCS" = "false" ] && [ "$GOVERNANCE" = "false" ] && [ "$RUNTIME" = "false" ] && [ "$SECURITY" = "false" ] && [ "$OTHER" = "false" ]; then
            tests_only=true
          fi

          if [ "$IS_PR" = "true" ]; then
            if printf '%s\n' "$PR_BODY" | grep -Eiq -- '^- \[x\] Changes policy/constitution behavior$'; then
              gov_policy_flag=true
            fi
            if printf '%s\n' "$PR_BODY" | grep -Eiq -- '^- \[x\] Changes replay or ledger behavior$'; then
              gov_replay_flag=true
            fi
          fi

          if [ "$docs_only" = "true" ]; then
            pr_tier=docs
          elif [ "$tests_only" = "true" ]; then
            pr_tier=low
          elif [ "$GOVERNANCE" = "true" ] || [ "$RUNTIME" = "true" ] || [ "$SECURITY" = "true" ] || [ "$gov_policy_flag" = "true" ] || [ "$gov_replay_flag" = "true" ]; then
            pr_tier=critical
          fi

          run_strict_replay=false
          run_evidence_suite=false
          run_promotion_suite=false
          strict_replay_reason='Skipped: no replay/runtime/security/governance trigger.'
          evidence_reason='Skipped: no evidence-impact trigger.'
          promotion_reason='Skipped: no promotion-impact trigger.'
          run_redteam_subset=false
          redteam_reason='Skipped: PR is not critical tier.'

          if [ "$pr_tier" = "critical" ] || [ "$gov_replay_flag" = "true" ]; then
            run_strict_replay=true
            strict_replay_reason="Ran: tier=${pr_tier} and/or replay-impact flag."
          elif [ "$docs_only" = "true" ] || [ "$tests_only" = "true" ]; then
            strict_replay_reason="Skipped: ${pr_tier}-only change."
          fi

          if [ "$SECURITY" = "true" ] || [ "$RUNTIME" = "true" ] || [ "$GOVERNANCE" = "true" ] || [ "$gov_replay_flag" = "true" ]; then
            run_evidence_suite=true
            evidence_reason='Ran: governance/runtime/security path or replay-impact flag detected.'
          elif [ "$docs_only" = "true" ] || [ "$tests_only" = "true" ]; then
            evidence_reason="Skipped: ${pr_tier}-only change."
          fi

          if [ "$GOVERNANCE" = "true" ] || [ "$RUNTIME" = "true" ] || [ "$gov_policy_flag" = "true" ] || [ "$pr_tier" = "critical" ]; then
            run_promotion_suite=true
            promotion_reason='Ran: governance/runtime impact or policy-impact flag detected.'
          elif [ "$docs_only" = "true" ] || [ "$tests_only" = "true" ]; then
            promotion_reason="Skipped: ${pr_tier}-only change."
          fi

          if [ "$IS_PR" = "true" ] && [ "$pr_tier" = "critical" ]; then
            run_redteam_subset=true
            redteam_reason='Ran: PR critical-path deterministic red-team subset.'
          fi

          {
            echo "docs_only=$docs_only"
            echo "tests_only=$tests_only"
            echo "gov_policy_flag=$gov_policy_flag"
            echo "gov_replay_flag=$gov_replay_flag"
            echo "pr_tier=$pr_tier"
            echo "run_strict_replay=$run_strict_replay"
            echo "run_evidence_suite=$run_evidence_suite"
            echo "run_promotion_suite=$run_promotion_suite"
            echo "strict_replay_reason=$strict_replay_reason"
            echo "evidence_reason=$evidence_reason"
            echo "promotion_reason=$promotion_reason"
            echo "run_redteam_subset=$run_redteam_subset"
            echo "redteam_reason=$redteam_reason"
          } >> "$GITHUB_OUTPUT"

  schema-validation:
    runs-on: ubuntu-latest
    needs: classify
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          install-deps: "true"
      - name: Validate governance policy schemas
        run: python scripts/validate_governance_schemas.py

  docs-validation:
    runs-on: ubuntu-latest
    needs: classify
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
      - name: Validate strict documentation snippets
        run: python scripts/validate_readme_alignment.py --format json
      - name: Validate manifest inventory alignment
        run: python scripts/validate_manifest_inventory.py --format json
      - name: Validate markdown link and image integrity
        run: python scripts/validate_docs_integrity.py --format json
      - name: Validate active docs dependency references
        run: python scripts/lint_active_docs_dependency_refs.py --format json
      - name: Validate governance + release markdown link integrity
        run: >-
          python scripts/validate_docs_integrity.py
          --format json
          --roots docs/governance docs/comms docs/release docs/releases

  workflow-python-version-guard:
    runs-on: ubuntu-latest
    needs: classify
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
      - name: Validate setup-python version pinning
        run: python scripts/check_workflow_python_version.py --expected-version 3.11.9

  artifact-trust-verification:
    runs-on: ubuntu-latest
    needs: classify
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
      - name: Verify required signed artifacts
        run: PYTHONPATH=. python scripts/verify_critical_artifacts.py

  full-test-suite:
    runs-on: ubuntu-latest
    needs: classify
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          install-deps: "true"
      - name: Run full test suite
        run: PYTHONPATH=. pytest tests/ -q

  governance-tests:
    runs-on: ubuntu-latest
    needs: classify
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          install-deps: "true"
      - name: Run governance tests
        run: PYTHONPATH=. pytest tests/ -k governance -q

  determinism-lint:
    runs-on: ubuntu-latest
    needs: classify
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
      - name: Run determinism lint
        run: python tools/lint_determinism.py runtime/ security/ adaad/orchestrator/ app/main.py

  import-boundary-lint:
    runs-on: ubuntu-latest
    needs: classify
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
      - name: Run import boundary lint
        # No pip install required — lint_import_paths.py uses stdlib only.
        run: python tools/lint_import_paths.py

  spdx-header-lint:
    runs-on: ubuntu-latest
    needs: classify
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"
      - name: Enforce SPDX license headers
        # No pip install required — check_spdx_headers.py uses stdlib only.
        run: python scripts/check_spdx_headers.py

  confidence-fast:
    runs-on: ubuntu-latest
    needs: classify
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          install-deps: "true"
      - name: Run fast confidence tests
        run: PYTHONPATH=. pytest tests/determinism/ tests/recovery/test_tier_manager.py -k "not shared_epoch_parallel_validation_is_deterministic_in_strict_mode" -q

  strict-replay:
    runs-on: ubuntu-latest
    needs: classify
    if: needs.classify.outputs.run_strict_replay == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          install-deps: "true"
      - name: Verify strict replay
        env:
          ADAAD_ENV: dev
          CRYOVANT_DEV_MODE: "1"
          ADAAD_FORCE_DETERMINISTIC_PROVIDER: "1"
          ADAAD_DETERMINISTIC_SEED: ci-strict-replay
        run: PYTHONPATH=. python -m app.main --verify-replay --replay strict

  evidence-suite:
    runs-on: ubuntu-latest
    needs: classify
    if: needs.classify.outputs.run_evidence_suite == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          install-deps: "true"
      - name: Run evidence/sandbox tests
        run: PYTHONPATH=. pytest tests/sandbox/ -q

  promotion-suite:
    runs-on: ubuntu-latest
    needs: classify
    if: needs.classify.outputs.run_promotion_suite == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          install-deps: "true"
      - name: Run promotion/governance tests
        run: PYTHONPATH=. pytest tests/governance/ tests/test_promotion_policy.py tests/test_promotion_state_machine.py -q


  redteam-critical-subset:
    runs-on: ubuntu-latest
    needs: classify
    if: needs.classify.outputs.run_redteam_subset == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          install-deps: "true"
      - name: Run deterministic red-team critical subset
        run: PYTHONPATH=. python tools/run_redteam_harness.py --subset critical --output reports/redteam/critical.json

  fast-path-innovations:
    runs-on: ubuntu-latest
    needs: classify
    if: needs.classify.outputs.runtime == 'true' || needs.classify.outputs.tests == 'true'
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          install-deps: "true"
      - name: Run fast-path innovation tests (route optimizer, entropy gate, checkpoint chain, parallel gate)
        run: |
          PYTHONPATH=. pytest \
            tests/test_mutation_route_optimizer.py \
            tests/test_entropy_fast_gate.py \
            tests/test_checkpoint_chain_new.py \
            tests/test_fast_path_scorer.py \
            tests/test_parallel_gate.py \
            -v --tb=short -q
      - name: Confirm fast-path modules importable (smoke)
        run: |
          PYTHONPATH=. python -c "
          from runtime.evolution.mutation_route_optimizer import MutationRouteOptimizer
          from runtime.evolution.entropy_fast_gate import EntropyFastGate
          from runtime.evolution.checkpoint_chain import build_checkpoint_chain
          from runtime.evolution.fast_path_scorer import fast_path_score
          from runtime.governance.parallel_gate import ParallelGovernanceGate
          print('ALL FAST-PATH MODULES IMPORTED OK')
          "

  semantic-diff-determinism:
    runs-on: ubuntu-latest
    needs: classify
    # PR-PHASE4-07: Verify SemanticDiffEngine produces identical scores on identical AST inputs.
    # Runs on any runtime change; always-on for main pushes.
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          install-deps: "true"
      - name: Run semantic diff determinism verification
        run: |
          PYTHONPATH=. python - << 'PY'
          import hashlib, json

          FIXTURES = [
              ("empty",    "", ""),
              ("simple",   "def f(): pass", "def f(): return 1"),
              ("import",   "import os", "import os
import sys"),
              ("class",    "class A: pass", "class A:
    def m(self): pass"),
              ("complex",  "x=1", "def g(a,b,c):\n  for i in range(a):\n    if b: c()\n  return a"),
              ("noop",     "x=1", "x=1"),
              ("multiline","a=1\nb=2", "a=1\nb=2\nc=3"),
              ("risk_high", "pass", "\n".join(["import " + m for m in "os sys json re ast hashlib hmac secrets pathlib".split()])),
              ("nested",   "def f(): pass", "def f():\n  def g():\n    def h(): return 1\n  return g"),
              ("blank",    "   ", "   "),
          ]

          from runtime.evolution.semantic_diff import SemanticDiffEngine

          run1 = {}
          run2 = {}
          engine = SemanticDiffEngine()

          for name, before, after in FIXTURES:
              result1 = engine.diff(before_source=before, after_source=after)
              result2 = engine.diff(before_source=before, after_source=after)
              run1[name] = {"risk": round(result1.risk_score, 8), "complexity": round(result1.complexity_score, 8)}
              run2[name] = {"risk": round(result2.risk_score, 8), "complexity": round(result2.complexity_score, 8)}

          diverged = []
          for name in run1:
              if run1[name] != run2[name]:
                  diverged.append({"fixture": name, "run1": run1[name], "run2": run2[name]})

          if diverged:
              print("SEMANTIC_DIFF_DETERMINISM_FAILURE:", json.dumps(diverged, indent=2))
              raise SystemExit(1)

          digest = hashlib.sha256(json.dumps(run1, sort_keys=True).encode()).hexdigest()
          print(f"semantic-diff-determinism PASSED — {len(FIXTURES)} fixtures verified, digest={digest[:16]}")
          PY

  release-evidence-readiness:
    runs-on: ubuntu-latest
    needs: classify
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
      - name: Validate claims evidence matrix links
        run: python scripts/validate_release_evidence.py
      - name: Validate release hardening claims against runtime capability checks
        run: python scripts/validate_release_hardening_claims.py

  simplification-contract-gate:
    runs-on: ubuntu-latest
    needs: classify
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
      - name: Validate simplification complexity/safety targets
        run: python scripts/validate_simplification_targets.py


  semantic-diff-determinism:
    runs-on: ubuntu-latest
    needs: classify
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          install-deps: "true"
      - name: Run semantic-diff determinism verification
        run: |
          PYTHONPATH=. python - <<'PY'
          import hashlib, json
          from runtime.evolution.semantic_diff import SemanticDiffEngine

          # 10 fixed AST fixtures (stable across runs)
          FIXTURES = [
              ("", "def foo(): pass"),
              ("def foo(): pass", "def foo():\n    return 42"),
              ("x = 1", "x = 1\ny = 2"),
              ("import os", "import os\nimport sys"),
              ("class A: pass", "class A:\n    def method(self): pass"),
              ("def f(a, b): return a + b", "def f(a, b, c=0): return a + b + c"),
              ("", "for i in range(10): print(i)"),
              ("try:\n    pass\nexcept: pass", "try:\n    x = 1\nexcept Exception as e: pass"),
              ("def a(): pass\ndef b(): pass", "def a():\n    return 1\ndef b():\n    return 2"),
              ("x=1;y=2", "x=1\ny=2\nz=x+y"),
          ]

          engine = SemanticDiffEngine()
          run1_digests, run2_digests = [], []
          for before, after in FIXTURES:
              d1 = engine.diff(before_source=before, after_source=after)
              d2 = engine.diff(before_source=before, after_source=after)
              digest1 = hashlib.sha256(json.dumps({
                  "risk": d1.risk_score, "complexity": d1.complexity_score,
                  "fallback": d1.fallback_used
              }, sort_keys=True).encode()).hexdigest()
              digest2 = hashlib.sha256(json.dumps({
                  "risk": d2.risk_score, "complexity": d2.complexity_score,
                  "fallback": d2.fallback_used
              }, sort_keys=True).encode()).hexdigest()
              run1_digests.append(digest1)
              run2_digests.append(digest2)
              if digest1 != digest2:
                  raise SystemExit(f"DETERMINISM_VIOLATION: fixture {FIXTURES.index((before,after))} diverged")

          assert run1_digests == run2_digests, "SemanticDiffEngine digest mismatch across runs"
          print(f"OK: all {len(FIXTURES)} SemanticDiffEngine fixtures are deterministic")
          PY

  ci-gating-summary:
    runs-on: ubuntu-latest
    needs:
      - classify
      - schema-validation
      - workflow-python-version-guard
      - artifact-trust-verification
      - determinism-lint
      - import-boundary-lint
      - spdx-header-lint
      - confidence-fast
      - strict-replay
      - evidence-suite
      - promotion-suite
      - redteam-critical-subset
      - release-evidence-readiness
      - simplification-contract-gate
      - fast-path-innovations
      - semantic-diff-determinism
    if: always()
    steps:
      - name: Write CI gating summary
        run: |
          {
            echo "## CI gating summary"
            echo
            echo '> **Legend:** `success` = passed · `failure` = blocking · `skipped` = conditional (check reason) · `cancelled` = pipeline aborted'
            echo
            echo "- PR tier: \`${{ needs.classify.outputs.pr_tier }}\`"
            echo "- Changed paths: docs=${{ needs.classify.outputs.docs }}, tests=${{ needs.classify.outputs.tests }}, governance=${{ needs.classify.outputs.governance }}, runtime=${{ needs.classify.outputs.runtime }}, security=${{ needs.classify.outputs.security }}, other=${{ needs.classify.outputs.other }}"
            echo "- Governance flags: policy=${{ needs.classify.outputs.gov_policy_flag }}, replay=${{ needs.classify.outputs.gov_replay_flag }}"
            echo
            echo "| Job | Result | Gate reason |"
            echo "| --- | --- | --- |"
            echo "| schema-validation | ${{ needs.schema-validation.result }} | Always-on baseline. |"
            echo "| workflow-python-version-guard | ${{ needs.workflow-python-version-guard.result }} | Fail-closed setup-python version pinning check. |"
            echo "| artifact-trust-verification | ${{ needs.artifact-trust-verification.result }} | Always-on signature/tamper gate for required artifacts. |"
            echo "| determinism-lint | ${{ needs.determinism-lint.result }} | Always-on baseline. |"
            echo "| import-boundary-lint | ${{ needs.import-boundary-lint.result }} | Always-on architecture boundary gate. |"
            echo "| spdx-header-lint | ${{ needs.spdx-header-lint.result }} | Always-on SPDX license header enforcement. |"
            echo "| confidence-fast | ${{ needs.confidence-fast.result }} | Always-on baseline. |"
            echo "| strict-replay | ${{ needs.strict-replay.result }} | ${{ needs.classify.outputs.strict_replay_reason }} |"
            echo "| evidence-suite | ${{ needs.evidence-suite.result }} | ${{ needs.classify.outputs.evidence_reason }} |"
            echo "| promotion-suite | ${{ needs.promotion-suite.result }} | ${{ needs.classify.outputs.promotion_reason }} |"
            echo "| redteam-critical-subset | ${{ needs.redteam-critical-subset.result }} | ${{ needs.classify.outputs.redteam_reason }} |"
            echo "| release-evidence-readiness | ${{ needs.release-evidence-readiness.result }} | Always-on matrix link validation. |"
            echo "| simplification-contract-gate | ${{ needs.simplification-contract-gate.result }} | Always-on simplification KPI contract gate (complexity/fan-in/legacy/metrics/runtime-cost). |"
            echo "| fast-path-innovations | ${{ needs.fast-path-innovations.result }} | Route optimizer / entropy gate / checkpoint chain / parallel gate — conditional on runtime or test changes. |"
            echo "| semantic-diff-determinism | ${{ needs.semantic-diff-determinism.result }} | PR-PHASE4-07: SemanticDiffEngine determinism — 10 AST fixture pairs verified identical across two independent runs. |"
            echo "| semantic-diff-determinism | ${{ needs.semantic-diff-determinism.result }} | Always-on: 10 AST fixture determinism proofs for SemanticDiffEngine. |"
          } >> "$GITHUB_STEP_SUMMARY"
