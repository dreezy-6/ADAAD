name: Branch Protection Check

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read
  administration: read

jobs:
  validate-branch-protection:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch protection via GitHub API
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'main';
            const normalizeContext = (value) => String(value || '').trim().replace(/\s+/g, ' ').toLowerCase();
            // Keep required check-run contexts centralized and exact to reduce policy drift.
            // Values should match GitHub branch protection required_status_checks.contexts exactly.
            const REQUIRED_CONTEXTS = {
              secretScan: [
                'Secret Scan / secret-scan',
              ],
              docsValidation: [
                'CI / docs-validation',
              ],
            };

            const branchResp = await github.rest.repos.getBranch({ owner, repo, branch });
            if (!branchResp || !branchResp.data || branchResp.data.name !== branch) {
              core.setFailed('main branch missing');
              return;
            }
            const protection = await github.rest.repos.getBranchProtection({ owner, repo, branch });
            const checks = protection.data.required_status_checks;
            if (!checks || !Array.isArray(checks.contexts) || checks.contexts.length === 0) {
              core.setFailed('required_status_checks missing');
              return;
            }

            const actualContexts = checks.contexts.map((ctx) => String(ctx));
            const normalizedActualContexts = new Set(actualContexts.map(normalizeContext));
            core.info(`Branch protection required check contexts: ${JSON.stringify(actualContexts)}`);

            const hasAnyRequiredContext = (candidates) =>
              candidates.some((candidate) => normalizedActualContexts.has(normalizeContext(candidate)));

            const hasSecretScan = hasAnyRequiredContext(REQUIRED_CONTEXTS.secretScan);
            if (!hasSecretScan) {
              core.setFailed(
                `required_status_checks must include one of: ${REQUIRED_CONTEXTS.secretScan.join(', ')}`
              );
              return;
            }

            const hasDocsValidation = hasAnyRequiredContext(REQUIRED_CONTEXTS.docsValidation);
            if (!hasDocsValidation) {
              core.setFailed(
                `required_status_checks must include one of: ${REQUIRED_CONTEXTS.docsValidation.join(', ')}`
              );
              return;
            }

            if (!protection.data.enforce_admins || protection.data.enforce_admins.enabled !== true) {
              core.setFailed('enforce_admins is not true');
              return;
            }
            const reviews = protection.data.required_pull_request_reviews;
            const approvals = reviews && Number(reviews.required_approving_review_count || 0);
            if (!reviews || approvals < 2) {
              core.setFailed(`required_approving_review_count must be >= 2 (found ${approvals || 0})`);
              return;
            }
